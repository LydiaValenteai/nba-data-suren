name: NBA Data Auto Scraper

# ==============================================================================
# 触发条件配置
# ==============================================================================
on:
  # 作用目的：允许我们在 GitHub 网页端手动点击按钮触发运行，方便随时测试代码
  workflow_dispatch: 
  
  # 作用目的：定时任务。采用 UTC 时间（北京时间减去 8 小时）。
  # 0 4 * * * 代表 UTC 4:00（北京时间 12:00）
  # 0 8 * * * 代表 UTC 8:00（北京时间 16:00）
  schedule:
    - cron: '0 4,8 * * *'

# ==============================================================================
# 工作流核心任务
# ==============================================================================
jobs:
  scrape-and-update:
    # 作用目的：向 GitHub 免费租用一台最新版的 Ubuntu Linux 云服务器
    runs-on: ubuntu-latest

    steps:
    # 1. 把我们仓库里的 Python 代码和数据下载到这台云服务器上
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 在云服务器上安装 Python 3.10 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装我们爬虫需要的三个核心第三方库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas nba_api requests

    # 4. 依次运行这两个 Python 脚本（此时它们会生成新的 CSV 并覆盖旧的 CSV）
    - name: Run scraper scripts
      run: |
        python fetch_daily_data.py
        python fetch_team_data.py

    # 5. 将更新后的 CSV 文件重新提交并推送到我们的 GitHub 仓库
    - name: Commit and push changes
      run: |
        # 伪装成 GitHub 官方机器人的身份进行提交
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 只将所有结尾为 .csv 的文件添加到暂存区
        git add *.csv
        
        # 逻辑判断：如果数据有变化才提交，如果数据没变就不提交（防止无意义的报错停止）
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Refresh NBA data"
        
        # 推送回仓库
        git push